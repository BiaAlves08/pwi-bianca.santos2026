<!DOCTYPE html>
<html lang="en">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segurança da Informação</title>

<style>

    header 
	{
  background-color: #4B0082;
  padding: 30px;
  text-align: center;
  font-size: 35px;
  color: white;
	}

nav 
	{
  float: left;
  width: 20%;
  height: 600px; 
  background: #9370DB;
  padding: 30px;
	}

nav ul 
	{
  list-style-type: none;
  padding: 0;
	}

  nav ul li {
            margin-bottom: 15px; /* Espaço entre um botão e outro */
        }

        nav ul li a {
            display: block; /* Faz o link ocupar a largura toda do menu */
            background-color: #4B0082; /* Cor de fundo do botão */
            color: white;
            text-decoration: none; /* Remove o sublinhado */
            padding: 12px;
            text-align: center;
            border-radius: 8px; /* Arredonda os cantos */
            font-family: Arial, sans-serif;
            font-weight: bold;
            transition: 0.3s; /* Deixa a transição de cor suave */
        }

        nav ul li a:hover {
            background-color: #6A5ACD; /* Cor que aparece ao passar o mouse */
            transform: scale(1.05); /* Aumenta levemente o botão */
        }

article {
  float:left;
  padding: 30px;
  width: 73%;
  background-color: #ffffff;
  height: 600px; 
}

article iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: none;
}

section::after {
  content: "";
  display: table;
  clear: both;
}

footer {
  background-color: #4B0082;
  padding: 10px;
  text-align: center;
  color: white;
}


@media (max-width: 600px) {
  nav, article {
    width: 100%;
    height: auto;
  }
}

    </style>
</head>

 <body>

<header>
<h2 style="font-family:fantasy;">Segurança da Informação</h2>
</header>

<section>
  <nav>
    <ul>
      <h1 style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">Menu</h1>
      <li><a href="#" target="seguranca" onclick="voltarInicio()"> Tela Inicial</a></li>
      <li><a href="https://solides.com.br/blog/seguranca-da-informacao/" target="seguranca" onclick="mostrarConteudo()">O que é Segurança da Informação?</a></li>
      <li><a href="https://pronnus.com.br/blog/triade-cia/" target="seguranca" onclick="mostrarConteudo()">CIA</a></li>
      <li><a href="https://ibsec.com.br/quais-sao-os-5-pilares-da-seguranca-da-informacao/" target="seguranca" onclick="mostrarConteudo()">Pilares de Segurança</a></li>
    </ul>
  </nav>
  
  
  <article>
    <img id="imagemInicial" src="image/10-dicas-preciosas-de-seguranca-da-informacao.webp" alt="100%" height="100%" width="102%">
    <iframe name="seguranca" src="about:blank"></iframe>
  </article>
</section>

<script>
  function mostrarConteudo() {
    document.getElementById("imagemInicial").style.display = "none";
    document.querySelector("iframe").style.display = "block";
  }

  function voltarInicio() {
    document.getElementById("imagemInicial").style.display = "block";
    document.querySelector("iframe").style.display = "none";
    document.querySelector("iframe").src = "about:blank";
  }
  </script>

<footer>
  <p>Bianca dos Santos</p>
  <p>1 DS - Noturno</p>
</footer>
 </body>   

</html>
