<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    
    <h1 style="text-align: center; color: red;">PARABÉNS, VOCÊ GANHOU UM IPHONE 17 GRÁTIS!!!</h1>
<h2 style="text-align: center;">RESTAM POUCAS UNIDADES, cadastre-se para receber AGORA o seu prémio</h2>

    <form>
<label for="nome">Nome</label><br>
<input type="text" id="nome" name="nome" value=""><br>
<br>

<label for="sobrenome">Sobrenome</label><br>
<input type="text" id="sobrenome" name="sobrenome" value=""><br>
<br>

<label for="idade">Idade</label><br>
<input type="number" id="idade" name="idade" value=""><br>
<br>

<label for="data">Data de Nascimento</label><br>
<input type="date" id="data" name="date" value=""><br>
<br>

<label for="telefone">Telefone (Whatsapp)</label><br>
<input type="tel" id="telefone" name="telefone" value="" placeholder="(00)00000-0000"><br>
<br>

<label for="email">E-mail</label><br>
<input type="text" id="email" name="email"><br>
<br>

<label for="endereco">Endereço de entrega</label><br>
<input type="text" id="endereco" name="endereco" value=""><br>
<br>

<label for="pais">Origem</label><br>
<input type="radio" id="pais" name="pais">Brasileiro(a)<br>
<input type="radio" id="pais" name="pais">Estrangeiro(a)<br>
<label for="pais">Se for estrangeiro, digite o nome do seu país:</label><br>
<input type="text" id="pais" name="pais" value=""><br>
<br>

<label for="estado">Estado de origem</label><br>
<label for="estado">Se você é brasileiro(a), defina o estado em que vive atualmente:</label><br>
<select name="estado" id="estado">
    <option></option>
    <option value="Acre">Acre</option>
    <option value="Alagoas">Alagoas</option>
    <option value="Amapá">Amapá</option>
    <option value="Amazonas">Amazonas</option>
    <option value="Bahia">Bahia</option>
    <option value="Ceará">Ceará</option>
    <option value="Distrito Federal">Distrito Federal</option>
    <option value="Espírito Santo">Espírito Santo</option>
    <option value="Goiás">Goiás</option>
    <option value="Maranhão">Maranhão</option>
    <option value="Mato Grosso">Mato Grosso</option>
    <option value="Mato Grosso do Sul">Mato Grosso do Sul</option>
    <option value="Minas Gerais">Minas Gerais</option>
    <option value="Pará">Pará</option>
    <option value="Paraíba">Paraíba</option>
    <option value="Paraná">Paraná</option>
    <option value="Pernambuco">Pernambuco</option>
    <option value="Piauí">Piauí</option>
    <option value="Rio de Janeiro">Rio de Janeiro</option>
    <option value="Rio Grande do Norte">Rio Grande do Norte</option>
    <option value="Rio Grande do Sul">Rio Grande do Sul</option>
    <option value="Rondônia">Rondônia</option>
    <option value="Roraima">Roraima</option>
    <option value="Santa Catarina">Santa Catarina</option>
    <option value="São Paulo">São Paulo</option>
    <option value="Sergipe">Sergipe</option>
    <option value="Tocantins">Tocantins</option>
</select>
<br>
<br>

<label for="cpf">CPF(Para emissão da nota fiscal)</label><br>
<input type="text" id="cpf" name="cpf" placeholder="000.000.000-00"><br>
<br>

<label for="rg">RG(Para complementar na nota fiscal)</label><br>
<input type="text" id="rg" name="rg" placeholder="00.000.000-0"><br>


<br>
<input type="submit" value="🥳RESGATE SEU PRÊMIO AGORA!🥳"><br>

    </form>
</body>
</html>
